<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Option C: Connected nodes (neural network / intelligence)
       with medical cross at center node, chart trending up -->

  <!-- Circle base -->
  <circle cx="60" cy="60" r="54" fill="#094344"/>
  <circle cx="60" cy="60" r="48" fill="#0c5657" opacity="0.4"/>

  <!-- Connection lines (neural network) -->
  <line x1="60" y1="42" x2="36" y2="30" stroke="#0eb8bc" stroke-width="1.5" opacity="0.4"/>
  <line x1="60" y1="42" x2="84" y2="30" stroke="#0eb8bc" stroke-width="1.5" opacity="0.4"/>
  <line x1="60" y1="42" x2="30" y2="58" stroke="#0eb8bc" stroke-width="1.5" opacity="0.4"/>
  <line x1="60" y1="42" x2="90" y2="58" stroke="#0eb8bc" stroke-width="1.5" opacity="0.4"/>
  <line x1="36" y1="30" x2="30" y2="58" stroke="#0eb8bc" stroke-width="1" opacity="0.25"/>
  <line x1="84" y1="30" x2="90" y2="58" stroke="#0eb8bc" stroke-width="1" opacity="0.25"/>

  <!-- Center node: medical cross -->
  <circle cx="60" cy="42" r="10" fill="#094344" stroke="#0eb8bc" stroke-width="2"/>
  <rect x="55.5" y="38" width="9" height="2.5" rx="1" fill="#f05483"/>
  <rect x="58.25" y="35.25" width="2.5" height="9" rx="1" fill="#f05483" opacity="0.9"/>
  <!-- Glow -->
  <circle cx="60" cy="42" r="10" fill="none" stroke="#0eb8bc" stroke-width="0.5" opacity="0.3">
    <animate attributeName="r" values="10;14;10" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Outer nodes -->
  <circle cx="36" cy="30" r="4" fill="#0eb8bc" opacity="0.6"/>
  <circle cx="84" cy="30" r="4" fill="#0eb8bc" opacity="0.6"/>
  <circle cx="30" cy="58" r="4" fill="#0eb8bc" opacity="0.6"/>
  <circle cx="90" cy="58" r="4" fill="#0eb8bc" opacity="0.6"/>

  <!-- Chart area (bottom half) -->
  <!-- Grid dots -->
  <circle cx="30" cy="72" r="1" fill="#0eb8bc" opacity="0.2"/>
  <circle cx="30" cy="82" r="1" fill="#0eb8bc" opacity="0.2"/>
  <circle cx="30" cy="92" r="1" fill="#0eb8bc" opacity="0.2"/>
  <circle cx="45" cy="72" r="1" fill="#0eb8bc" opacity="0.2"/>
  <circle cx="45" cy="82" r="1" fill="#0eb8bc" opacity="0.2"/>
  <circle cx="60" cy="72" r="1" fill="#0eb8bc" opacity="0.2"/>
  <circle cx="60" cy="82" r="1" fill="#0eb8bc" opacity="0.2"/>
  <circle cx="75" cy="72" r="1" fill="#0eb8bc" opacity="0.2"/>
  <circle cx="90" cy="72" r="1" fill="#0eb8bc" opacity="0.2"/>

  <!-- Rising line chart -->
  <polyline points="26,94 38,88 50,84 60,76 72,70 84,62 92,56"
            stroke="#0eb8bc" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Area fill under chart -->
  <path d="M26,94 L38,88 L50,84 L60,76 L72,70 L84,62 L92,56 L92,98 L26,98 Z"
        fill="#0eb8bc" opacity="0.1"/>

  <!-- Data points on chart -->
  <circle cx="50" cy="84" r="2.5" fill="#f05483"/>
  <circle cx="72" cy="70" r="2.5" fill="#f05483"/>
  <circle cx="92" cy="56" r="2.5" fill="#f05483"/>
</svg>
