<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 210" fill="none">
  <!-- GIS Logo: Heart containing brain with rising chart arrow -->

  <!-- Outer heart outline -->
  <path d="M100 190
           C45 150 8 115 8 72
           C8 42 30 16 60 16
           C78 16 92 30 100 44
           C108 30 122 16 140 16
           C170 16 192 42 192 72
           C192 115 155 150 100 190Z"
        fill="none" stroke="#0eb8bc" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Inner heart outline (thinner, creates double-line effect) -->
  <path d="M100 175
           C52 140 22 110 22 74
           C22 50 40 28 64 28
           C80 28 92 40 100 52
           C108 40 120 28 136 28
           C160 28 178 50 178 74
           C178 110 148 140 100 175Z"
        fill="none" stroke="#0eb8bc" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

  <!-- Left brain hemisphere (lighter teal) -->
  <path d="M100 60
           C95 58 88 52 78 52
           C62 52 48 62 44 78
           C40 92 46 108 54 118
           C62 128 74 136 86 142
           C92 146 96 150 100 158
           L100 60Z"
        fill="#0eb8bc"/>

  <!-- Left brain folds -->
  <path d="M58 72 C66 68 76 72 80 80" stroke="white" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M52 92 C60 86 72 88 78 96" stroke="white" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M58 110 C66 104 76 108 82 114" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Right brain hemisphere (darker) -->
  <path d="M100 60
           C105 58 112 52 122 52
           C138 52 152 62 156 78
           C160 92 154 108 146 118
           C138 128 126 136 114 142
           C108 146 104 150 100 158
           L100 60Z"
        fill="#094344"/>

  <!-- Right brain folds -->
  <path d="M142 72 C134 68 124 72 120 80" stroke="#0eb8bc" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M148 92 C140 86 128 88 122 96" stroke="#0eb8bc" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.4"/>
  <path d="M142 110 C134 104 124 108 118 114" stroke="#0eb8bc" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.35"/>

  <!-- Brain stem / bottom connection -->
  <path d="M92 148 C96 156 100 162 100 162 C100 162 104 156 108 148"
        fill="none" stroke="#0eb8bc" stroke-width="2" opacity="0.4"/>

  <!-- Rising chart arrow through center -->
  <polyline points="62,130 76,112 88,118 100,90 112,78 130,56 148,34"
            stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Arrow tip -->
  <polygon points="148,34 138,30 142,42" fill="white"/>
</svg>
