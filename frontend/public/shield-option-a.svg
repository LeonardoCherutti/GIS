<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Option A: Brain silhouette with chart line through center -->

  <!-- Circular base -->
  <circle cx="60" cy="58" r="52" fill="#094344"/>
  <circle cx="60" cy="58" r="46" fill="#0c5657" opacity="0.5"/>

  <!-- Simplified brain outline (left hemisphere) -->
  <path d="M38 40 C38 30 45 24 52 24 C56 24 59 26 60 29
           C58 29 55 32 55 36 C55 40 58 43 58 47
           C58 51 55 53 52 55 C48 57 44 55 42 52
           C40 49 38 45 38 40Z"
        fill="none" stroke="#0eb8bc" stroke-width="2" opacity="0.7"/>

  <!-- Simplified brain outline (right hemisphere) -->
  <path d="M82 40 C82 30 75 24 68 24 C64 24 61 26 60 29
           C62 29 65 32 65 36 C65 40 62 43 62 47
           C62 51 65 53 68 55 C72 57 76 55 78 52
           C80 49 82 45 82 40Z"
        fill="none" stroke="#0eb8bc" stroke-width="2" opacity="0.7"/>

  <!-- Rising chart line cutting through brain -->
  <polyline points="30,78 40,72 48,74 55,62 62,55 70,48 78,35 88,28"
            stroke="#0eb8bc" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Chart dots at key points -->
  <circle cx="55" cy="62" r="3" fill="#f05483"/>
  <circle cx="70" cy="48" r="3" fill="#f05483"/>
  <circle cx="88" cy="28" r="2.5" fill="#f05483"/>

  <!-- Upward arrow at end of chart -->
  <polyline points="83,26 88,28 86,33" stroke="#f05483" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" transform="rotate(-25, 88, 28)"/>

  <!-- Small medical cross bottom-center -->
  <rect x="56" y="86" width="8" height="2.5" rx="1" fill="#f05483"/>
  <rect x="58.75" y="83.25" width="2.5" height="8" rx="1" fill="#f05483"/>
</svg>
