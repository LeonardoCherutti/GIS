<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Option B: Heartbeat pulse morphs into rising bar chart -->

  <!-- Rounded square base -->
  <rect x="6" y="6" width="108" height="108" rx="22" fill="#094344"/>
  <rect x="12" y="12" width="96" height="96" rx="18" fill="#0c5657" opacity="0.4"/>

  <!-- Pulse line that becomes chart bars -->
  <!-- Flat line start -->
  <polyline points="20,62 28,62 33,62"
            stroke="#0eb8bc" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Heartbeat spike -->
  <polyline points="33,62 37,48 41,76 45,38 49,62"
            stroke="#0eb8bc" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Transition line -->
  <polyline points="49,62 56,62"
            stroke="#0eb8bc" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Bar chart (growing from the pulse line) -->
  <rect x="60" y="58" width="9" height="24" rx="2" fill="#0eb8bc" opacity="0.5"/>
  <rect x="72" y="48" width="9" height="34" rx="2" fill="#0eb8bc" opacity="0.7"/>
  <rect x="84" y="36" width="9" height="46" rx="2" fill="#0eb8bc"/>

  <!-- Trend arrow above bars -->
  <line x1="62" y1="52" x2="90" y2="30" stroke="#f05483" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="84,29 90,30 88,36" stroke="#f05483" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Small medical cross top-left -->
  <rect x="22" y="28" width="10" height="3" rx="1" fill="#f05483" opacity="0.8"/>
  <rect x="25.5" y="24.5" width="3" height="10" rx="1" fill="#f05483" opacity="0.8"/>
</svg>
