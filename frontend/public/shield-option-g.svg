<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Option G: Rounded square, single bold ECG→uptrend, minimal and iconic -->

  <!-- Base -->
  <rect x="6" y="6" width="108" height="108" rx="24" fill="#094344"/>

  <!-- Single clean ECG that trends up — the whole story in one line -->
  <!-- Baseline → small P wave → massive QRS → recovery → trends up steeply -->
  <polyline points="
    14,65
    20,65
    28,65
    32,61
    35,65
    38,65
    41,55
    44,82
    47,24
    50,75
    54,60
    58,65
    68,65
    72,58
    76,52
    80,44
    85,36
    90,27
    96,18
    103,10
  "
  stroke="#0eb8bc" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Gradient glow under the uptrend -->
  <path d="M58,65 L68,65 L72,58 L76,52 L80,44 L85,36 L90,27 L96,18 L103,10 L103,65 Z"
        fill="#0eb8bc" opacity="0.12"/>

  <!-- QRS peak dot -->
  <circle cx="47" cy="24" r="3" fill="#f05483"/>

  <!-- Medical cross integrated into the QRS peak -->
  <rect x="43" y="14" width="8" height="2" rx="0.8" fill="#f05483" opacity="0.8"/>
  <rect x="46" y="11" width="2" height="8" rx="0.8" fill="#f05483" opacity="0.8"/>

  <!-- End arrow -->
  <polyline points="99,8 103,10 100,15" stroke="#f05483" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Subtle baseline reference -->
  <line x1="14" y1="65" x2="103" y2="65" stroke="#0eb8bc" stroke-width="0.5" opacity="0.15" stroke-dasharray="4,4"/>
</svg>
